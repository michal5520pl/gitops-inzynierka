apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: gitops
spec:
  project: default
  source:
    chart: headlamp
    repoURL: https://kubernetes-sigs.github.io/headlamp
    helm:
      valuesObject:
        service:
          type: LoadBalancer
  destination:
    name: "in-cluster"
    namespace: kube-dashboard
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
