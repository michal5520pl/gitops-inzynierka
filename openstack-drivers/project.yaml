---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: openstack
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  sourceRepos:
    - https://kubernetes.github.io/cloud-provider-openstack
    - https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
  destinations:
    - name: in-cluster
      namespace: openstack-*
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
      name: openstack-*
    - group: storage.k8s.io
      kind: CSIDriver
    - group: storage.k8s.io
      kind: StorageClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: csi-*
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: csi-*
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: manila-csi*
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: manila-csi*
    - group: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: "*.snapshot.storage.k8s.io"
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: StatefulSet
    - group: ''
      kind: ServiceAccount
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
...
